document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"bdb95d22-e467-4930-a617-a172115fcec1\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;font-family:'PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;color:#1c2024;background:#f4f5f6;--accent:#0d7361;--accent-press:#0a5e4f;--accent-soft:#eaf3ee;--accent-ink:#2f6b54;--accent-tint:#f1f8f4;--accent-tint2:#fbfdfc;--accent-soft-bd:#cfe6db;--accent-chip-bd:#e0ece6}\n  ::placeholder{color:#aab1ba}\n  input:focus,textarea:focus,select:focus{outline:none}\n  button{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;{{ themeVars }}\">\n\n  <!-- Topbar -->\n  <header style=\"position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;height:56px;padding:0 clamp(14px,4vw,24px);background:#ffffff;border-bottom:1px solid #e8eaed\">\n    <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n      <div style=\"display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;letter-spacing:-0.02em\">P<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:8px;min-width:0;overflow:hidden\">\n        <strong style=\"font-size:14.5px;font-weight:650;letter-spacing:-0.01em\">PubSync<\u002Fstrong>\n        <span style=\"font-size:12.5px;color:#878f99;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:clamp(0px,16vw,160px)\">多平台内容自动化<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px;flex:0 0 auto\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <span style=\"font-size:11.5px;color:#9aa1aa;font-weight:550\">主色<\u002Fspan>\n        <button type=\"button\" onclick=\"{{ setGreen }}\" title=\"墨绿\" style=\"width:20px;height:20px;border-radius:50%;background:#0d7361;cursor:pointer;padding:0;border:2px solid #fff;{{ greenRing }}\"><\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ setWarm }}\" title=\"暖陶\" style=\"width:20px;height:20px;border-radius:50%;background:#bd5b34;cursor:pointer;padding:0;border:2px solid #fff;{{ warmRing }}\"><\u002Fbutton>\n      <\u002Fdiv>\n      <button type=\"button\" style=\"display:flex;align-items:center;gap:8px;height:34px;padding:0 10px 0 12px;border:1px solid #e6e8eb;border-radius:8px;background:#fff;cursor:pointer\" style-hover=\"background:#f7f8f9\">\n        <span style=\"display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:#eef1f6;color:#44506a;font-size:11px;font-weight:700\">A<\u002Fspan>\n        <span style=\"font-size:13px;color:#3a4048;font-weight:550\">admin<\u002Fspan>\n        <span style=\"font-size:10px;color:#aab1ba\">▾<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Main tabs -->\n  <nav style=\"display:flex;gap:4px;align-items:flex-end;height:46px;padding:0 clamp(14px,4vw,24px);background:#fff;border-bottom:1px solid #e8eaed;position:sticky;top:56px;z-index:29;overflow-x:auto\">\n    <sc-for list=\"{{ mainTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n      <div onclick=\"{{ t.onClick }}\" style=\"display:flex;align-items:center;height:100%;padding:0 12px;font-size:14px;cursor:pointer;white-space:nowrap;flex:0 0 auto;border-bottom:2px solid transparent;margin-bottom:-1px;{{ t.style }}\">{{ t.label }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- Content -->\n  <main style=\"flex:1;width:100%;max-width:1080px;margin:0 auto;padding:20px clamp(14px,4vw,24px) 56px\">\n\n    <!-- Social subnav -->\n    <sc-if value=\"{{ isSocial }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;gap:18px;border-bottom:1px solid #e8eaed;margin-bottom:14px;overflow-x:auto\">\n        <div style=\"display:flex;gap:2px\">\n          <sc-for list=\"{{ socialGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ g.onClick }}\" style=\"padding:9px 10px;font-size:14px;white-space:nowrap;flex:0 0 auto;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;{{ g.style }}\">{{ g.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showSocialSubs }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:inline-flex;gap:2px;padding:3px;background:#ececee;border-radius:9px;margin-bottom:22px\">\n          <sc-for list=\"{{ socialSubs }}\" as=\"sb\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ sb.onClick }}\" style=\"padding:6px 14px;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;{{ sb.style }}\">{{ sb.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <!-- Wechat subnav -->\n    <sc-if value=\"{{ isWechat }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:center;gap:18px;border-bottom:1px solid #e8eaed;margin-bottom:22px;overflow-x:auto\">\n        <div style=\"display:flex;gap:2px\">\n          <sc-for list=\"{{ wechatTabs }}\" as=\"g\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ g.onClick }}\" style=\"padding:9px 10px;font-size:14px;white-space:nowrap;flex:0 0 auto;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;{{ g.style }}\">{{ g.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 数据采集 ===== -->\n    <sc-if value=\"{{ r.xhsCollect }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}数据采集<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:620px\">先选择博主，再配置采样数量、评论数量与 ASR；采集结果会进入「博主资产」。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;padding:14px 18px;background:#fff;border:1px solid #e8eaed;border-radius:12px;overflow-x:auto;margin-bottom:18px\">\n        <sc-for list=\"{{ collectSteps }}\" as=\"st\" hint-placeholder-count=\"7\">\n          <sc-if value=\"{{ st.line }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"flex:1;height:1px;background:#e3e5e8;margin:0 14px\"><\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ st.isNode }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:9px;flex:0 0 auto\">\n              <div style=\"display:grid;place-items:center;width:24px;height:24px;border-radius:50%;font-size:12.5px;font-weight:650;{{ st.circleStyle }}\">{{ st.n }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;{{ st.labelStyle }}\">{{ st.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:18px 20px;border-bottom:1px solid #eef0f2\">\n          <div>\n            <h2 style=\"margin:0 0 3px;font-size:15.5px;font-weight:650\">选择要采集的博主<\u002Fh2>\n            <p style=\"margin:0;font-size:12.5px;color:#878f99\">共 {{ bloggerTotal }} 位 · {{ collectFooter }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;background:#f5f6f7;border:1px solid #e6e8eb;border-radius:9px;min-width:140px;flex:1\">\n              <span style=\"color:#aab1ba;font-size:14px\">⌕<\u002Fspan>\n              <input type=\"search\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"搜索昵称或领域\" style=\"flex:1;border:0;background:transparent;font-size:13px;color:#1c2024\">\n            <\u002Fdiv>\n            <button type=\"button\" style=\"height:36px;padding:0 14px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">+ 创建博主<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px\">\n          <sc-for list=\"{{ collectBloggers }}\" as=\"b\" hint-placeholder-count=\"6\">\n            <button type=\"button\" onclick=\"{{ b.select }}\" style=\"display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid #e6e8eb;border-radius:11px;background:#fff;cursor:pointer;text-align:left;transition:border-color 140ms,background 140ms,box-shadow 140ms;{{ b.selStyle }}\">\n              <div style=\"display:grid;place-items:center;width:42px;height:42px;border-radius:11px;font-size:17px;font-weight:600;flex:0 0 auto;{{ b.avatarStyle }}\">{{ b.avatarChar }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14.5px;font-weight:620;color:#1c2024;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px\">{{ b.name }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                  <span style=\"flex:0 0 auto;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:550;{{ b.nicheStyle }}\">{{ b.nicheLabel }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#9aa1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums\">{{ b.meta }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"display:grid;place-items:center;width:21px;height:21px;border-radius:50%;border:1.5px solid #d4d8dd;font-size:11px;font-weight:800;flex:0 0 auto;{{ b.checkStyle }}\">✓<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;border-top:1px solid #eef0f2;background:#fafbfc\">\n          <span style=\"font-size:13px;color:#6b727b\">{{ collectFooter }}<\u002Fspan>\n          <button type=\"button\" disabled=\"{{ collectNextDisabled }}\" style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 18px;background:#0d7361;color:#fff;border:0;border-radius:9px;font-size:13.5px;font-weight:620;cursor:pointer;{{ collectNextStyle }}\">下一步 →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 蒸馏 ===== -->\n    <sc-if value=\"{{ r.xhsDistill }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}博主蒸馏<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:640px\">选择博主与采集批次，生成蒸馏报告与可复用的风格 Skill；保存后才进入 AI 创作可选列表。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;padding:14px 18px;background:#fff;border:1px solid #e8eaed;border-radius:12px;overflow-x:auto;margin-bottom:18px\">\n        <sc-for list=\"{{ distillSteps }}\" as=\"st\" hint-placeholder-count=\"7\">\n          <sc-if value=\"{{ st.line }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"flex:1;height:1px;background:#e3e5e8;margin:0 14px\"><\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ st.isNode }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:9px;flex:0 0 auto\">\n              <div style=\"display:grid;place-items:center;width:24px;height:24px;border-radius:50%;font-size:12.5px;font-weight:650;{{ st.circleStyle }}\">{{ st.n }}<\u002Fdiv>\n              <span style=\"font-size:13.5px;{{ st.labelStyle }}\">{{ st.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:18px 20px;border-bottom:1px solid #eef0f2\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:3px\">\n              <h2 style=\"margin:0;font-size:15.5px;font-weight:650\">确认蒸馏结果<\u002Fh2>\n              <span style=\"padding:2px 9px;border-radius:6px;font-size:11.5px;font-weight:600;background:#f6efdf;color:#9a6b1f\">待确认<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0;font-size:12.5px;color:#878f99\">{{ distillBloggerName }} · 批次 {{ distillBatch }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px\">\n            <button type=\"button\" style=\"height:36px;padding:0 14px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:13px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">放弃本次<\u002Fbutton>\n            <button type=\"button\" style=\"height:36px;padding:0 16px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">保存结果<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1px;background:#eef0f2\">\n          <div style=\"background:#fff;padding:20px\">\n            <h3 style=\"margin:0 0 14px;font-size:13.5px;font-weight:650;color:#3a4048\">蒸馏报告<\u002Fh3>\n            <div style=\"display:grid;gap:14px\">\n              <sc-for list=\"{{ distillReport }}\" as=\"rp\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid;gap:4px\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <span style=\"width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto\"><\u002Fspan>\n                    <strong style=\"font-size:13px;font-weight:620;color:#1c2024\">{{ rp.h }}<\u002Fstrong>\n                  <\u002Fdiv>\n                  <p style=\"margin:0 0 0 13px;font-size:13px;line-height:1.7;color:#565d66\">{{ rp.p }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;padding:20px\">\n            <h3 style=\"margin:0 0 14px;font-size:13.5px;font-weight:650;color:#3a4048\">Skill 输出<\u002Fh3>\n            <pre style=\"margin:0;padding:16px;background:#f7f8f9;border:1px solid #eef0f2;border-radius:10px;font-family:'SFMono-Regular',ui-monospace,monospace;font-size:12px;line-height:1.7;color:#3a4048;white-space:pre-wrap;max-height:340px;overflow:auto\">{{ distillSkill }}<\u002Fpre>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 博主资产 ===== -->\n    <sc-if value=\"{{ r.xhsAssets }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}博主资产<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b\">集中查看博主信息、采集历史、蒸馏历史、报告与 Skill。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:16px;align-items:start\">\n        <aside style=\"flex:1 1 220px;min-width:200px;background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:10px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 8px 10px\">\n            <strong style=\"font-size:12.5px;font-weight:650;color:#3a4048\">博主<\u002Fstrong>\n            <span style=\"font-size:12px;color:#9aa1aa\">{{ bloggerTotal }} 个<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;gap:4px\">\n            <sc-for list=\"{{ assetSidebar }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <button type=\"button\" onclick=\"{{ b.select }}\" style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid transparent;border-radius:10px;cursor:pointer;text-align:left;{{ b.rowStyle }}\">\n                <div style=\"display:grid;place-items:center;width:32px;height:32px;border-radius:9px;font-size:13px;font-weight:600;flex:0 0 auto;{{ b.avatarStyle }}\">{{ b.avatarChar }}<\u002Fdiv>\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;{{ b.nameStyle }}\">{{ b.name }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9aa1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.sub }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Faside>\n\n        <div style=\"display:flex;flex-direction:column;gap:16px;min-width:0;flex:999 1 340px\">\n          <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n              <div style=\"min-width:0\">\n                <span style=\"font-size:12px;color:#878f99;font-weight:550\">博主资产<\u002Fspan>\n                <h2 style=\"margin:4px 0 6px;font-size:18px;font-weight:680\">{{ assetName }}<\u002Fh2>\n                <p style=\"margin:0;font-size:13px;color:#6b727b;line-height:1.6;max-width:520px\">{{ assetDesc }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;flex-shrink:0\">\n                <button type=\"button\" style=\"height:34px;padding:0 13px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">{{ assetFavLabel }}<\u002Fbutton>\n                <button type=\"button\" style=\"height:34px;padding:0 13px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">编辑信息<\u002Fbutton>\n                <button type=\"button\" style=\"height:34px;padding:0 13px;background:#fff;border:1px solid #eddcd9;border-radius:9px;font-size:12.5px;font-weight:550;color:#b4453a;cursor:pointer\" style-hover=\"background:#fbf3f1\">删除<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:18px\">\n              <sc-for list=\"{{ assetSnapshot }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                  <span style=\"display:block;font-size:12px;color:#878f99;font-weight:550;margin-bottom:6px\">{{ m.label }}<\u002Fspan>\n                  <strong style=\"font-size:18px;font-weight:680;color:#1c2024;font-variant-numeric:tabular-nums\">{{ m.value }}<\u002Fstrong>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\">\n            <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n                <strong style=\"font-size:13.5px;font-weight:650;color:#3a4048\">采集历史<\u002Fstrong>\n                <span style=\"font-size:12px;color:#9aa1aa\">3 次<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;gap:8px\">\n                <sc-for list=\"{{ assetRuns }}\" as=\"rn\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid #eef0f2;border-radius:10px;padding:11px 12px\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px\">\n                      <strong style=\"font-size:13px;font-weight:600;color:#1c2024;font-variant-numeric:tabular-nums\">{{ rn.head }}<\u002Fstrong>\n                      <span style=\"padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;{{ rn.pill.style }}\">{{ rn.pill.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ rn.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n            <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n                <strong style=\"font-size:13.5px;font-weight:650;color:#3a4048\">蒸馏历史<\u002Fstrong>\n                <span style=\"font-size:12px;color:#9aa1aa\">3 次<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;gap:8px\">\n                <sc-for list=\"{{ assetDistills }}\" as=\"d\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid #eef0f2;border-radius:10px;padding:11px 12px\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px\">\n                      <strong style=\"font-size:13px;font-weight:600;color:#1c2024;font-variant-numeric:tabular-nums\">{{ d.head }}<\u002Fstrong>\n                      <span style=\"padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;{{ d.pill.style }}\">{{ d.pill.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ d.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n          <\u002Fdiv>\n\n          <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px 20px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n              <div>\n                <span style=\"font-size:12px;color:#878f99;font-weight:550\">采集样本<\u002Fspan>\n                <h3 style=\"margin:3px 0 0;font-size:14px;font-weight:650\">批次 {{ assetSampleBatch }}<\u002Fh3>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ assetSamples }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"padding:13px 0;border-bottom:1px solid #f1f3f4\">\n                  <div style=\"font-size:13.5px;font-weight:600;color:#1c2024;margin-bottom:4px\">{{ p.title }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ p.meta }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 AI 创作 ===== -->\n    <sc-if value=\"{{ r.xhsPackages }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }} AI 创作<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b\">按步骤生成一条新内容；历史结果请到「发布包历史」查看。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;padding:14px 18px ius:9px;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">保存发布包<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px\">\n          <!-- STEP 1 -->\n          <sc-if value=\"{{ cs1 }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px\">\n              <sc-for list=\"{{ createBloggers }}\" as=\"b\" hint-placeholder-count=\"6\">\n                <button type=\"button\" onclick=\"{{ b.select }}\" style=\"display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid #e6e8eb;border-radius:11px;background:#fff;cursor:pointer;text-align:left;transition:border-color 140ms,background 140ms;{{ b.selStyle }}\">\n                  <div style=\"display:grid;place-items:center;width:42px;height:42px;border-radius:11px;font-size:17px;font-weight:600;flex:0 0 auto;{{ b.avatarStyle }}\">{{ b.avatarChar }}<\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-size:14.5px;font-weight:620;color:#1c2024;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px\">{{ b.name }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                      <span style=\"flex:0 0 auto;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:550;{{ b.nicheStyle }}\">{{ b.nicheLabel }}<\u002Fspan>\n                      <span style=\"font-size:12px;color:#9aa1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums\">{{ b.meta }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"display:grid;place-items:center;width:21px;height:21px;border-radius:50%;border:1.5px solid #d4d8dd;font-size:11px;font-weight:800;flex:0 0 auto;{{ b.checkStyle }}\">✓<\u002Fspan>\n 02Fdiv>\n            <div style=\"display:grid;gap:10px\">\n              <sc-for list=\"{{ createIdeas }}\" as=\"idea\" hint-placeholder-count=\"3\">\n                <button type=\"button\" onclick=\"{{ idea.select }}\" style=\"display:grid;gap:6px;text-align:left;padding:14px 15px;border:1px solid #e6e8eb;border-radius:11px;background:#fff;cursor:pointer;{{ idea.cardStyle }}\">\n                  <span style=\"width:fit-content;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;{{ idea.tagStyle }}\">{{ idea.tagLabel }}<\u002Fspan>\n                  <strong style=\"font-size:14.5px;font-weight:650;line-height:1.4\">{{ idea.title }}<\u002Fstrong>\n                  <span style=\"font-size:12.5px;color:#565d66;line-height:1.6\">{{ idea.angle }}<\u002Fspan>\n                  <small style=\"font-size:12px;color:#9aa1aa;line-height:1.55\">推荐理由：{{ idea.reason }}<\u002Fsmall>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- STEP 4 -->\n          <sc-if value=\"{{ cs4 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px\">\n              <p style=\"margin:0;font-size:13px;color:#6b727b\">选择内容类型并生成正文 / 脚本。<\u002Fp>\n              <button type=\"button\" style=\"height:36px;padding:0 16px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;flex:0 0 auto\" style-hover=\"background:var(--accent-press)\">重新生成<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--accent-soft-bd);background:var(--accent-tint);border-radius:11px;padding:13px 15px;margin-bottom:16px\">\n              <span style=\"font-size:11.5px;color:var(--accent-ink);font-weight:600\">已选方向<\u002Fspan>\n              <strong style=\"display:block;margin-top:4px;font-size:14.5px;font-weight:650;line-height:1.4\">{{ selIdea.title }}<\u002Fstrong>\n              <p style=\"margin:5px 0 0;font-size:12.5px;color:#565d66;line-height:1.6\">{{ selIdea.angle }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:18px\">\n              <sc-for list=\"{{ createTypes }}\" as=\"ct\" hint-placeholder-count=\"4\">\n                <button type=\"button\" onclick=\"{{ ct.select }}\" style=\"display:flex;align-items:flex-start;gap:11px;padding:14px;border:1px solid #e6e8eb;border-radius:11px;background:#fff;cursor:pointer;text-align:left;{{ ct.cardStyle }}\">\n                  <span style=\"width:18px;height:18px;border-radius:50%;border:1.5px solid #cfd4d9;margin-top:1px;flex:0 0 auto;{{ ct.dotStyle }}\"><\u002Fspan>\n                  <div>\n                    <strong style=\"font-size:13.5px;font-weight:620\">{{ ct.name }}<\u002Fstrong>\n                    <span style=\"display:block;margin-top:3px;font-size:12px;color:#9aa1aa;line-height:1.5\">{{ ct.desc }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #eef0f2;border-radius:12px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fafbfc;border-bottom:1px solid #eef0f2\">\n                <strong style=\"font-size:12.5px;font-weight:650;color:#3a4048\">正文预览<\u002Fstrong>\n                <button type=\"button\" style=\"height:28px;padding:0 11px;background:#fff;border:1px solid #e0e3e6;border-radius:7px;font-size:12px;color:#565d66;cursor:pointer\" style-hover=\"background:#f3f4f5\">复制正文<\u002Fbutton>\n              <\u002Fdiv>\n              <pre style=\"margin:0;padding:16px 18px;font-family:inherit;font-size:13.5px;line-height:1.85;color:#33383e;white-space:pre-wrap\">{{ draft.body }}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- STEP 5 -->\n          <sc-if value=\"{{ cs5 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px\">\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">封面文案<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">{{ draft.cover }}<\u002Fstrong>\n              <\u002Fdiv>\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">标签<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">5 个<\u002Fstrong>\n              <\u002Fdiv>\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">配图<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">4 张<\u002Fstrong>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px\">\n              <sc-for list=\"{{ draft.hashtags }}\" as=\"h\" hint-placeholder-count=\"5\">\n                <span style=\"padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:550;background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent-chip-bd)\">{{ h }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px\">\n              <div style=\"aspect-ratio:3/4;border-radius:11px;border:1px solid #e6e8eb;background:repeating-linear-gradient(45deg,#f5f6f7,#f5f6f7 9px,#eef0f2 9px,#eef0f2 18px);display:grid;place-items:center\"><span style=\"font-family:monospace;font-size:11px;color:#9aa1aa\">封面图<\u002Fspan><\u002Fdiv>\n              <div style=\"aspect-ratio:3/4;border-radius:11px;border:1px solid #e6e8eb;background:repeating-linear-gradient(45deg,#f5f6f7,#f5f6f7 9px,#eef0f2 9px,#eef0f2 18px);display:grid;place-items:center\"><span style=\"font-family:monospace;font-size:11px;color:#9aa1aa\">配图 2<\u002Fspan><\u002Fdiv>\n              <div style=\"aspect-ratio:3/4;border-radius:11px;border:1px solid #e6e8eb;background:repeating-linear-gradient(45deg,#f5f6f7,#f5f6f7 9px,#eef0f2 9px,#eef0f2 18px);display:grid;place-items:center\"><span style=\"font-family:monospace;font-size:11px;color:#9aa1aa\">配图 3<\u002Fspan><\u002Fdiv>\n              <div style=\"aspect-ratio:3/4;border-radius:11px;border:1px solid #e6e8eb;background:repeating-linear-gradient(45deg,#f5f6f7,#f5f6f7 9px,#eef0f2 9px,#eef0f2 18px);display:grid;place-items:center\"><span style=\"font-family:monospace;font-size:11px;color:#9aa1aa\">配图 4<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- STEP 6 -->\n          <sc-if value=\"{{ cs6 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n              <span style=\"padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;background:var(--accent-soft);color:var(--accent-ink)\">{{ draft.type }}<\u002Fspan>\n              <span style=\"font-size:12.5px;color:#9aa1aa\">{{ draft.topic }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"margin:0 0 16px;font-size:18px;font-weight:680;line-height:1.4\">{{ draft.title }}<\u002Fh3>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px\">\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">主题<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">{{ draft.topic }}<\u002Fstrong>\n              <\u002Fdiv>\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">封面文案<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">{{ draft.cover }}<\u002Fstrong>\n              <\u002Fdiv>\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:11px;padding:12px 14px\">\n                <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:5px\">标签<\u002Fspan>\n                <strong style=\"font-size:13.5px;font-weight:620;color:#1c2024\">5 个<\u002Fstrong>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px\">\n              <sc-for list=\"{{ draft.hashtags }}\" as=\"h\" hint-placeholder-count=\"5\">\n                <span style=\"padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:550;background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent-chip-bd)\">{{ h }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #eef0f2;border-radius:12px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fafbfc;border-bottom:1px solid #eef0f2\">\n                <strong style=\"font-size:12.5px;font-weight:650;color:#3a4048\">正文预览<\u002Fstrong>\n                <button type=\"button\" style=\"height:28px;padding:0 11px;background:#fff;border:1px solid #e0e3e6;border-radius:7px;font-size:12px;color:#565d66;cursor:pointer\" style-hover=\"background:#f3f4f5\">复制正文<\u002Fbutton>\n              <\u002Fdiv>\n              <pre style=\"margin:0;padding:16px 18px;font-family:inherit;font-size:13.5px;line-height:1.85;color:#33383e;white-space:pre-wrap\">{{ draft.body }}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;border-top:1px solid #eef0f2;background:#fafbfc\">\n          <button type=\"button\" onclick=\"{{ createPrev }}\" style=\"height:38px;padding:0 16px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:13px;font-weight:550;color:#565d66;cursor:pointer;{{ createPrevStyle }}\" style-hover=\"background:#f3f4f5\">← 上一步<\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ createNext }}\" style=\"height:38px;padding:0 18px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:620;cursor:pointer;{{ createNextStyle }}\" style-hover=\"background:var(--accent-press)\">下一步 →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 公众号 每日早报 ===== -->\n    <sc-if value=\"{{ r.wechatBrief }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px\">\n        <div style=\"background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:14px 16px\">\n          <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:6px\">候选内容<\u002Fspan>\n          <strong style=\"font-size:19px;font-weight:680;font-variant-numeric:tabular-nums\">{{ newsTotal }}<\u002Fstrong>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:14px 16px\">\n          <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:6px\">已勾选<\u002Fspan>\n          <strong style=\"font-size:19px;font-weight:680;font-variant-numeric:tabular-nums;color:var(--accent)\">{{ newsSelected }}<\u002Fstrong>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:14px 16px\">\n          <span style=\"display:block;font-size:12px;color:#878f99;margin-bottom:6px\">工作区<\u002Fspan>\n          <strong style=\"font-size:15px;font-weight:650\">PubSync 总部<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px\">\n        <div>\n          <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">每日早报<\u002Fh1>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:560px\">新闻采集、候选筛选与早报生成是独立链路，勾选后进入公众号文章草稿。<\u002Fp>\n        <\u002Fdiv>\n        <button type=\"button\" style=\"height:38px;padding:0 16px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:13px;font-weight:600;color:#3a4048;cursor:pointer\" style-hover=\"background:#f7f8f9\">↻ 重新抓取<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:2px;padding:3px;background:#ececee;border-radius:9px;margin-bottom:16px\">\n        <sc-for list=\"{{ newsTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ t.onClick }}\" style=\"display:flex;align-items:center;gap:7px;padding:6px 13px;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;{{ t.style }}\">\n            <span>{{ t.label }}<\u002Fspan>\n            <span style=\"padding:0 6px;border-radius:999px;font-size:11px;font-weight:700;line-height:17px;{{ t.countStyle }}\">{{ t.count }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:grid;gap:10px\">\n        <sc-for list=\"{{ newsList }}\" as=\"n\" hint-placeholder-count=\"5\">\n          <article style=\"display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border:1px solid #eef0f2;border-radius:13px;{{ n.cardStyle }}\">\n            <button type=\"button\" onclick=\"{{ n.toggle }}\" style=\"display:grid;place-items:center;width:22px;height:22px;margin-top:1px;border-radius:6px;border:1.5px solid #cfd4d9;font-size:12px;font-weight:800;cursor:pointer;flex:0 0 auto;{{ n.checkStyle }}\">✓<\u002Fbutton>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"margin:0 0 6px;font-size:15px;font-weight:650;line-height:1.45\">{{ n.title }}<\u002Fh3>\n              <div style=\"font-size:12px;color:#9aa1aa;margin-bottom:8px\">{{ n.meta }}<\u002Fdiv>\n              <p style=\"margin:0;font-size:13px;line-height:1.65;color:#565d66\">{{ n.summary }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:grid;place-items:center;width:46px;height:46px;border:1px solid;border-radius:11px;flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;{{ n.scoreStyle }}\">{{ n.score }}<\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px\">\n        <button type=\"button\" style=\"height:34px;padding:0 14px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:13px;color:#9aa1aa;cursor:not-allowed\">上一页<\u002Fbutton>\n        <span style=\"font-size:13px;color:#6b727b;font-variant-numeric:tabular-nums\">第 1 / 1 页<\u002Fspan>\n        <button type=\"button\" style=\"height:34px;padding:0 14px;background:#fff;border:1px solid #e0e3e6;border-radius:9px;font-size:13px;color:#9aa1aa;cursor:not-allowed\">下一页<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 公众号 AI 创作 ===== -->\n    <sc-if value=\"{{ r.wechatAi }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">公众号 AI 创作<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:640px\">博主风格创作与自主 AI 创作会生成公众号文章，并复用预览与草稿箱发布能力。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px\">\n        <article style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:22px\">\n          <span style=\"font-size:12px;color:#878f99;font-weight:550\">博主风格创作<\u002Fspan>\n          <h3 style=\"margin:8px 0 8px;font-size:16px;font-weight:650\">公众号博主蒸馏<\u002Fh3>\n          <p style=\"margin:0 0 16px;font-size:13px;line-height:1.7;color:#6b727b\">采集公众号文章样本，蒸馏风格资产，再应用风格生成公众号文章。<\u002Fp>\n          <span style=\"display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:550;background:#f1f2f4;color:#9aa1aa\">暂未开放<\u002Fspan>\n        <\u002Farticle>\n        <article style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:22px\">\n          <span style=\"font-size:12px;color:#878f99;font-weight:550\">自主 AI 创作<\u002Fspan>\n          <h3 style=\"margin:8px 0 8px;font-size:16px;font-weight:650\">输入主题生成文章<\u002Fh3>\n          <p style=\"margin:0 0 16px;font-size:13px;line-height:1.7;color:#6b727b\">输入主题、目标读者与内容目标，由 AI 自主规划并生成公众号文章。<\u002Fp>\n          <span style=\"display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:550;background:#f1f2f4;color:#9aa1aa\">暂未开放<\u002Fspan>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 后台管理 ===== -->\n    <sc-if value=\"{{ r.admin }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:20px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">后台管理<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:640px\">管理员创建账号与工作空间；普通账号登录后只进入自己的工作空间。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start\">\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:22px\">\n          <h3 style=\"margin:0 0 16px;font-size:14.5px;font-weight:650\">创建账号<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px\">\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">用户名<\u002Flabel>\n              <input type=\"text\" placeholder=\"如 lisa.hk\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">初始密码<\u002Flabel>\n              <input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">工作空间名称<\u002Flabel>\n              <input type=\"text\" placeholder=\"如 香港保险组\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">工作空间标识<\u002Flabel>\n              <input type=\"text\" placeholder=\"留空则使用用户名\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <label style=\"display:flex;align-items:center;gap:9px;font-size:13px;color:#3a4048;margin-bottom:18px;cursor:pointer\">\n            <input type=\"checkbox\" style=\"width:18px;height:18px;accent-color:var(--accent)\">\n            创建为管理员账号\n          <\u002Flabel>\n          <button type=\"button\" style=\"height:38px;padding:0 18px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">创建账号<\u002Fbutton>\n        <\u002Fsection>\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px 20px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">\n            <h3 style=\"margin:0;font-size:14.5px;font-weight:650\">账号列表<\u002Fh3>\n            <span style=\"font-size:12px;color:#9aa1aa\">3 个<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <sc-for list=\"{{ adminUsers }}\" as=\"u\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid #f1f3f4\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:13.5px;font-weight:620;color:#1c2024;margin-bottom:3px\">{{ u.name }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1aa\">{{ u.meta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;flex:0 0 auto;{{ u.pill.style }}\">{{ u.pill.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 发布包历史 ===== -->\n    <sc-if value=\"{{ r.xhsHistory }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px\">\n        <div>\n          <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}发布包历史<\u002Fh1>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:600px\">保存后的发布包按时间汇总，可复制文案或继续编辑。共 {{ pubPackagesTotal }} 个。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;background:#f5f6f7;border:1px solid #e6e8eb;border-radius:9px;min-width:140px;flex:1;max-width:280px\">\n          <span style=\"color:#aab1ba;font-size:14px\">⌕<\u002Fspan>\n          <input type=\"search\" placeholder=\"搜索标题或主题\" style=\"flex:1;border:0;background:transparent;font-size:13px;color:#1c2024\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;gap:10px\">\n        <sc-for list=\"{{ pubPackages }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <article style=\"display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:#fff;border:1px solid #e8eaed;border-radius:13px\">\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap\">\n                <h3 style=\"margin:0;font-size:15px;font-weight:650;line-height:1.45\">{{ p.title }}<\u002Fh3>\n                <span style=\"padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;flex:0 0 auto;{{ p.pill.style }}\">{{ p.pill.label }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9aa1aa;margin-bottom:3px\">{{ p.meta }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#aab1ba;font-variant-numeric:tabular-nums\">{{ p.footer }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;flex:0 0 auto\">\n              <button type=\"button\" style=\"height:32px;padding:0 12px;background:#fff;border:1px solid #e0e3e6;border-radius:8px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">复制文案<\u002Fbutton>\n              <button type=\"button\" style=\"height:32px;padding:0 12px;background:#fff;border:1px solid #e0e3e6;border-radius:8px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">查看<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 发布记录 ===== -->\n    <sc-if value=\"{{ r.xhsRecords }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:18px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}发布记录<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:600px\">已发布内容的状态与互动数据回收；失败的发布可重试。<\u002Fp>\n      <\u002Fdiv>\n      <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:11px 18px;background:#fafbfc;border-bottom:1px solid #eef0f2;font-size:12px;color:#9aa1aa;font-weight:600\">\n          <span>内容<\u002Fspan><span>状态<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ xhsRecords }}\" as=\"r2\" hint-placeholder-count=\"3\">\n          <div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:15px 18px;border-bottom:1px solid #f1f3f4\">\n            <div style=\"min-width:0\">\n              <div style=\"font-size:14px;font-weight:600;color:#1c2024;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px\">{{ r2.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ r2.date }} · {{ r2.metrics }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;flex:0 0 auto;{{ r2.pill.style }}\">{{ r2.pill.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 小红书 设置 ===== -->\n    <sc-if value=\"{{ r.xhsSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:18px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">{{ sname }}设置<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:600px\">采集服务凭证与默认采集参数；改动只影响后续新建的采集批次。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start\">\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 16px;font-size:14.5px;font-weight:650\">采集服务（TikHub）<\u002Fh3>\n          <div style=\"display:grid;gap:14px\">\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">API Key<\u002Flabel>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <input type=\"password\" value=\"tk_live_8f3c……a91\" style=\"flex:1;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n                <span style=\"padding:5px 10px;border-radius:6px;font-size:11.5px;font-weight:600;background:var(--accent-soft);color:var(--accent-ink);flex:0 0 auto\">已配置<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">单次采集预算上限（美元）<\u002Flabel>\n              <input type=\"number\" value=\"2.00\" step=\"0.5\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 12px;font-size:14.5px;font-weight:650\">默认采集参数<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-bottom:6px\">\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">默认采样笔记数<\u002Flabel>\n              <input type=\"number\" value=\"50\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">每条评论数<\u002Flabel>\n              <input type=\"number\" value=\"20\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <label style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0 2px;cursor:pointer\">\n            <span style=\"min-width:0\">\n              <strong style=\"display:block;font-size:13.5px;font-weight:600;color:#1c2024\">默认启用 ASR（视频字幕/转写）<\u002Fstrong>\n              <small style=\"font-size:12px;color:#9aa1aa\">采集视频笔记时优先提取字幕，无字幕时尝试转写音频。<\u002Fsmall>\n            <\u002Fspan>\n            <span style=\"position:relative;width:38px;height:22px;border-radius:999px;background:var(--accent);flex:0 0 auto\">\n              <span style=\"position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff\"><\u002Fspan>\n            <\u002Fspan>\n          <\u002Flabel>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 公众号 文章草稿 ===== -->\n    <sc-if value=\"{{ r.wechatDrafts }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px\">\n        <div>\n          <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">文章草稿<\u002Fh1>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:600px\">AI 生成的文章先进入草稿箱，确认后可一键推送公众号草稿。共 {{ wechatDraftTotal }} 篇。<\u002Fp>\n        <\u002Fdiv>\n        <button type=\"button\" style=\"height:38px;padding:0 16px;background:var(--accent);color:#fff;border:0;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">+ 新建文章<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;gap:10px\">\n        <sc-for list=\"{{ wechatDrafts }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <article style=\"background:#fff;border:1px solid #e8eaed;border-radius:13px;padding:16px 18px\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap\">\n              <h3 style=\"margin:0;font-size:15px;font-weight:650;line-height:1.45;flex:1;min-width:0\">{{ d.title }}<\u002Fh3>\n              <span style=\"padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;flex:0 0 auto;{{ d.pill.style }}\">{{ d.pill.label }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0 0 10px;font-size:13px;line-height:1.6;color:#565d66\">{{ d.intro }}<\u002Fp>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n              <span style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ d.date }}<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <button type=\"button\" style=\"height:32px;padding:0 12px;background:#fff;border:1px solid #e0e3e6;border-radius:8px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">编辑<\u002Fbutton>\n                <button type=\"button\" style=\"height:32px;padding:0 12px;background:#fff;border:1px solid #e0e3e6;border-radius:8px;font-size:12.5px;font-weight:550;color:#565d66;cursor:pointer\" style-hover=\"background:#f7f8f9\">预览<\u002Fbutton>\n                <button type=\"button\" style=\"height:32px;padding:0 12px;background:var(--accent);color:#fff;border:0;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer\" style-hover=\"background:var(--accent-press)\">推送公众号<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ d.error }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:10px;padding:9px 12px;border-radius:9px;background:#f9efed;border:1px solid #f0dcd8;font-size:12.5px;color:#b4453a\">{{ d.error }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 公众号 发布记录 ===== -->\n    <sc-if value=\"{{ r.wechatRecords }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:18px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">公众号发布记录<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:600px\">已推送到公众号草稿箱的文章记录；失败的可重新推送。<\u002Fp>\n      <\u002Fdiv>\n      <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;overflow:hidden\">\n        <sc-for list=\"{{ wechatRecords }}\" as=\"r2\" hint-placeholder-count=\"3\">\n          <div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:15px 18px;border-bottom:1px solid #f1f3f4\">\n            <div style=\"min-width:0\">\n              <div style=\"font-size:14px;font-weight:600;color:#1c2024;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px\">{{ r2.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9aa1aa;font-variant-numeric:tabular-nums\">{{ r2.date }} · {{ r2.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;flex:0 0 auto;{{ r2.pill.style }}\">{{ r2.pill.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== SCREEN: 公众号 设置 ===== -->\n    <sc-if value=\"{{ r.wechatSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:18px\">\n        <h1 style=\"margin:0 0 6px;font-size:21px;font-weight:680;letter-spacing:-0.01em\">公众号设置<\u002Fh1>\n        <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#6b727b;max-width:640px\">公众号账号、内容画像、发布计划与新闻采集参数。改动对后续生成与发布生效。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start\">\n\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 16px;font-size:14.5px;font-weight:650\">公众号账号<\u002Fh3>\n          <div style=\"display:grid;gap:14px\">\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">AppID<\u002Flabel>\n              <input type=\"text\" value=\"wx2a9f3c7b1e8d4a06\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">AppSecret<\u002Flabel>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <input type=\"password\" value=\"••••••••••••••••\" style=\"flex:1;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n                <span style=\"padding:5px 10px;border-radius:6px;font-size:11.5px;font-weight:600;background:var(--accent-soft);color:var(--accent-ink);flex:0 0 auto\">已配置<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 16px;font-size:14.5px;font-weight:650\">内容画像<\u002Fh3>\n          <div style=\"display:grid;gap:14px\">\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px\">\n              <div>\n                <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">公众号名称<\u002Flabel>\n                <input type=\"text\" value=\"湾区财富观察\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">内容领域<\u002Flabel>\n                <input type=\"text\" value=\"财经 · 房产 · 保险\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">编辑人设<\u002Flabel>\n              <input type=\"text\" value=\"理性、克制、关注确定性的财经主编\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px\">\n              <div>\n                <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">目标读者<\u002Flabel>\n                <input type=\"text\" value=\"30-45 岁中产家庭\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">分组方式<\u002Flabel>\n                <select style=\"width:100%;height:38px;padding:0 10px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n                  <option>按地域分组<\u002Foption><option>不分组<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 6px;font-size:14.5px;font-weight:650\">发布计划<\u002Fh3>\n          <label style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid #f1f3f4;cursor:pointer\">\n            <span style=\"min-width:0\"><strong style=\"display:block;font-size:13.5px;font-weight:600;color:#1c2024\">每日自动发布<\u002Fstrong><small style=\"font-size:12px;color:#9aa1aa\">到点自动抓取、生成并推送当日早报。<\u002Fsmall><\u002Fspan>\n            <span style=\"position:relative;width:38px;height:22px;border-radius:999px;background:var(--accent);flex:0 0 auto\"><span style=\"position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff\"><\u002Fspan><\u002Fspan>\n          <\u002Flabel>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;padding:14px 0\">\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">频率<\u002Flabel>\n              <select style=\"width:100%;height:38px;padding:0 10px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\"><option>每日<\u002Foption><option>每周<\u002Foption><option>每月<\u002Foption><\u002Fselect>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:12.5px;color:#6b727b;margin-bottom:6px;font-weight:550\">发布时间<\u002Flabel>\n              <input type=\"time\" value=\"08:00\" style=\"width:100%;height:38px;padding:0 12px;border:1px solid #e0e3e6;border-radius:9px;background:#fff;font-size:13.5px;color:#1c2024\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <label style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0 2px;cursor:pointer\">\n            <span style=\"min-width:0\"><strong style=\"display:block;font-size:13.5px;font-weight:600;color:#1c2024\">自动推送公众号草稿<\u002Fstrong><small style=\"font-size:12px;color:#9aa1aa\">生成完成后直接进入公众号草稿箱。<\u002Fsmall><\u002Fspan>\n            <span style=\"position:relative;width:38px;height:22px;border-radius:999px;background:var(--accent);flex:0 0 auto\"><span style=\"position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff\"><\u002Fspan><\u002Fspan>\n          <\u002Flabel>\n        <\u002Fsection>\n\n        <section style=\"background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:20px\">\n          <h3 style=\"margin:0 0 6px;font-size:14.5px;font-weight:650\">配图<\u002Fh3>\n          <label style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid #f1f3f4;cursor:pointer\">\n            <span style=\"min-width:0\"><strong style=\"display:block;font-size:13.5px;font-weight:600;color:#1c2024\">生成文章配图<\u002Fstrong><small style=\"font-size:12px;color:#9aa1aa\">为每篇文章自动规划并生成配图。<\u002Fsmall><\u002Fspan>\n            <span style=\"position:relative;width:38px;height:22px;border-radius:999px;background:var(--accent);flex:0 0 auto\"><span style=\"position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff\"><\u002Fspan><\u002Fspan>\n          <\u  wechatTabs = [\n      this.navTab('每日早报', s.wechatTab === 'brief', setW('brief')),\n      this.navTab('AI 创作', s.wechatTab === 'ai', setW('ai')),\n      this.navTab('文章草稿', s.wechatTab === 'drafts', setW('drafts')),\n      this.navTab('发布记录', s.wechatTab === 'records', setW('records')),\n      this.navTab('设置', s.wechatTab === 'settings', setW('settings'))\n    ];\n\n    const r = {\n      wechatBrief: isWechat && s.wechatTab === 'brief',\n      wechatAi: isWechat && s.wechatTab === 'ai',\n      xhsCollect: isSocial && s.socialTab === 'collect',\n      xhsDistill: isSocial && s.socialTab === 'distill',\n      xhsAssets: isSocial && s.socialTab === 'assets',\n      xhsPackages: isSocial && s.socialTab === 'packages',\n      xhsHistory: isSocial && s.socialTab === 'history',\n      xhsRecords: isSocial && s.socialTab === 'records',\n      xhsSettings: isSocial && s.socialTab === 'settings',\n      wechatDrafts: isWechat && s.wechatTab === 'drafts',\n      wechatRecords: isWechat && s.wechatTab === 'records',\n      wechatSettings: isWechat && s.wechatTab === 'settings',\n      admin: s.platform === 'admin'\n    };\n    r.placeholder = !Object.values(r).some(Boolean);\n\n    let phTitle = '', phSub = '';\n    if (r.placeholder) {\n      const tab = isWechat ? s.wechatTab : s.socialTab;\n      const pre = isWechat ? '公众号' : sname;\n      const map = {\n        drafts: ['公众号文章草稿', '草稿箱与一键发布能力后续开放。'],\n        records: [`${pre}发布记录`, '发布记录与数据回收能力后续开放。'],\n        settings: [`${pre}设置`, '平台账号与发布参数设置后续开放。'],\n        history: [`${sname}发布包历史`, '保存后的发布包会在这里按时间汇总。']\n      };\n      const m = map[tab] || ['该模块', '该模块暂未开放。'];\n      phTitle = m[0]; phSub = m[1];\n    }\n\n    // 数据采集 blogger grid\n    const q = (s.query || '').trim();\n    const filtered = this.bloggersRaw.filter((b) => !q || b.name.includes(q) || (b.niche || '').includes(q));\n    const collectBloggers = filtered.map((b) => {\n      const isSel = b.id === s.selectedBloggerId;\n      const muted = !b.niche ||
