    # PubSync managed block start
    location = /pubsync {
        return 301 /pubsync/;
    }

    location /pubsync/api/ {
        proxy_pass http://pubsync-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* ^/pubsync/(.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /usr/share/nginx/pubsync/$1;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /pubsync/ {
        alias /usr/share/nginx/pubsync/;
        index index.html;
        try_files $uri $uri/ /pubsync/index.html;
    }
    # PubSync managed block end
