# 后端/worker 的运行时配置来源：
#   - 基础设施 / 密钥 / 应用配置 → 整体来自 .env（env_file 注入容器），
#     未在 .env 写的项由 app/config.py 的默认值兜底（默认值只有这一处，不会再对不齐）。
#   - 仅以下「拓扑」项在 compose 里覆盖，因为它们依赖容器服务名/容器内路径，不该写进 .env。
#   - 每个工作空间的业务配置（公众号、发布时间、配图数量、新闻来源等）存在数据库里，
#     由应用 UI 管理，不在这里配置。
x-env-file: &env-file
  - .env

x-runtime-env: &runtime-env
  DATABASE_URL: postgresql+psycopg://${DB_USER:-pubsync}:${DB_PASSWORD:-change_me}@postgres:5432/${DB_NAME:-pubsync}
  REDIS_URL: redis://redis:6379/0
  STATIC_DIR: /app/static

x-backend-build: &backend-build
  context: ../backend
  dockerfile: Dockerfile
  args:
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.cloud.tencent.com/pypi/simple}
    PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.cloud.tencent.com}

services:
  postgres:
    image: postgres:16-alpine
    container_name: pubsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pubsync}
      POSTGRES_USER: ${DB_USER:-pubsync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pubsync_postgres_data:/var/lib/postgresql/data
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pubsync} -d ${DB_NAME:-pubsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pubsync-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - pubsync_redis_data:/data
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: *backend-build
    container_name: pubsync-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: *env-file
    environment: *runtime-env
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - pubsync_generated_media:/app/static
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  worker:
    build: *backend-build
    container_name: pubsync-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: *env-file
    environment: *runtime-env
    volumes:
      - pubsync_generated_media:/app/static
    networks:
      - pubsync-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_BASE_PATH: ${FRONTEND_BASE_PATH:-/PubSync/}
    container_name: pubsync-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-18082}:80"
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  pubsync-network:
    driver: bridge

volumes:
  pubsync_postgres_data:
  pubsync_generated_media:
  pubsync_redis_data:
