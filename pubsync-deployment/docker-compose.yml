services:
  postgres:
    image: postgres:16-alpine
    container_name: pubsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pubsync}
      POSTGRES_USER: ${DB_USER:-pubsync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pubsync_postgres_data:/var/lib/postgresql/data
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pubsync} -d ${DB_NAME:-pubsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.cloud.tencent.com/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.cloud.tencent.com}
    container_name: pubsync-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-pubsync}:${DB_PASSWORD:-change_me}@postgres:5432/${DB_NAME:-pubsync}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      PUBLISH_TIME_HOUR: ${PUBLISH_TIME_HOUR:-8}
      PUBLISH_TIME_MINUTE: ${PUBLISH_TIME_MINUTE:-0}
      AUTO_SEND_WECHAT_DRAFT: ${AUTO_SEND_WECHAT_DRAFT:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me}
      AUTH_SECRET: ${AUTH_SECRET:-}
      SESSION_HOURS: ${SESSION_HOURS:-24}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4.1}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_TEXT_MODEL: ${MINIMAX_TEXT_MODEL:-MiniMax-M2.7}
      MINIMAX_IMAGE_MODEL: ${MINIMAX_IMAGE_MODEL:-image-01}
      TIKHUB_BASE_URL: ${TIKHUB_BASE_URL:-https://api.tikhub.io}
      TIKHUB_API_KEY: ${TIKHUB_API_KEY:-}
      TIKHUB_REQUEST_PRICE_USD: ${TIKHUB_REQUEST_PRICE_USD:-0.001}
      TIKHUB_MIN_REQUEST_PRICE_USD: ${TIKHUB_MIN_REQUEST_PRICE_USD:-0.001}
      TIKHUB_MAX_REQUEST_PRICE_USD: ${TIKHUB_MAX_REQUEST_PRICE_USD:-0.01}
      GENERATE_ARTICLE_IMAGES: ${GENERATE_ARTICLE_IMAGES:-true}
      MAX_ARTICLE_IMAGES: ${MAX_ARTICLE_IMAGES:-3}
      MIN_ARTICLE_IMAGES: ${MIN_ARTICLE_IMAGES:-1}
      NEWS_SOURCE_URLS: ${NEWS_SOURCE_URLS:-}
      INTERNATIONAL_NEWS_SOURCE_URLS: ${INTERNATIONAL_NEWS_SOURCE_URLS:-}
      DOMESTIC_NEWS_SOURCE_URLS: ${DOMESTIC_NEWS_SOURCE_URLS:-}
      NEWS_PER_SOURCE_LIMIT: ${NEWS_PER_SOURCE_LIMIT:-8}
      INTERNATIONAL_NEWS_CANDIDATES: ${INTERNATIONAL_NEWS_CANDIDATES:-40}
      DOMESTIC_NEWS_CANDIDATES: ${DOMESTIC_NEWS_CANDIDATES:-40}
      NEWS_LOOKBACK_HOURS: ${NEWS_LOOKBACK_HOURS:-72}
      MAX_NEWS_CANDIDATES: ${MAX_NEWS_CANDIDATES:-80}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      STATIC_DIR: /app/static
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - pubsync_generated_media:/app/static
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_BASE_PATH: ${FRONTEND_BASE_PATH:-/PubSync/}
    container_name: pubsync-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-18082}:80"
    networks:
      - pubsync-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  pubsync-network:
    driver: bridge

volumes:
  pubsync_postgres_data:
  pubsync_generated_media:
