# 缓存策略:带内容哈希的 /assets/* 长期不可变缓存;HTML(index/login/admin)及所有回落路径
# 每次都校验(no-cache)——配合 ETag 走 304,部署后普通刷新即可拿到新版,不再吃旧缓存。
# 放在 server 块外(http 上下文),因为本文件被 include 进 nginx.conf 的 http {} 里。
map $uri $cache_control {
    default     "no-cache";
    ~*/assets/  "public, max-age=31536000, immutable";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense-in-depth; LLM-generated HTML is also sanitized
    # client-side with DOMPurify before being injected via v-html).
    # 注意:这些 add_header 全在 server 级、且各 location 内一律不再写 add_header,
    # 才能让它们(连同下面的 Cache-Control)继承到每个 location;否则 nginx 的
    # add_header 继承规则会让带 add_header 的 location 丢掉这些头。
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'" always;
    add_header Cache-Control $cache_control always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 独立管理后台入口(多页构建产出的 admin.html)。
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        try_files /admin.html =404;
    }

    # 工作台 SPA(login.html)+ vue-router history 路由。
    # 登录、旧平台工作台(/xhs /douyin /wechat,现仅公众号在用)、对象驱动新架构页(/home /blogger
    # /account /create /drafts /find)刷新/深链都回落到 login.html,交给前端路由解析;
    # 真实静态文件(login.html、/assets/*)仍优先命中。
    location /login {
        try_files $uri /login.html;
    }
    location /xhs {
        try_files $uri /login.html;
    }
    location /douyin {
        try_files $uri /login.html;
    }
    location /wechat {
        try_files $uri /login.html;
    }
    # —— 对象驱动新架构路由(UI·9 起为默认;不加这些,刷新/深链会落到落地页 index.html)——
    location /home {
        try_files $uri /login.html;
    }
    location /blogger {
        try_files $uri /login.html;
    }
    location /account {
        try_files $uri /login.html;
    }
    location /create {
        try_files $uri /login.html;
    }
    location /drafts {
        try_files $uri /login.html;
    }
    location /find {
        try_files $uri /login.html;
    }
    location /settings-new {
        try_files $uri /login.html;
    }

    # 根路径 = 落地页(index.html);未知路径回落到落地页。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
