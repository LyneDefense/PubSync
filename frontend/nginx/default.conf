server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense-in-depth; LLM-generated HTML is also sanitized
    # client-side with DOMPurify before being injected via v-html).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'" always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 独立管理后台入口(多页构建产出的 admin.html)。
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        try_files /admin.html =404;
    }

    # 登录/工作台入口(多页构建产出的 login.html)。
    location = /login {
        return 301 /login/;
    }
    location /login/ {
        try_files /login.html =404;
    }

    # 根路径 = 落地页(index.html);未知路径回落到落地页。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
